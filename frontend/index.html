<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DevOps 值班台</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 250, 242, 0.92);
      --panel-strong: #fffaf2;
      --ink: #1e1b16;
      --muted: #6f675d;
      --line: rgba(88, 66, 36, 0.16);
      --accent: #b5542f;
      --accent-soft: #f4d7b8;
      --accent-deep: #7d2f16;
      --good: #2f7d4a;
      --warn: #c18418;
      --bad: #9b2f2f;
      --shadow: 0 20px 45px rgba(83, 54, 21, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    p {
      margin: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(250, 210, 146, 0.55), transparent 32%),
        radial-gradient(circle at bottom right, rgba(190, 102, 64, 0.18), transparent 30%),
        linear-gradient(135deg, #f8f3ea 0%, #efe3d1 45%, #e5d3be 100%);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      overflow: hidden;
    }

    .shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      height: 100dvh;
      padding: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 36px);
      min-height: 0;
    }

    .brand {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 245, 230, 0.95), rgba(255, 248, 239, 0.7));
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent-deep);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .metrics {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: nowrap;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .runtime-panel {
      display: grid;
      gap: 6px;
      padding: 8px 10px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.7);
      flex: 0 0 auto;
    }

    .runtime-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .runtime-form label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .runtime-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 6px;
    }

    .runtime-field {
      min-width: 0;
    }

    select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(164, 125, 82, 0.16);
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      outline: none;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .metric {
      flex: 1 1 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(164, 125, 82, 0.12);
    }

    .metric strong {
      display: inline;
      flex: 0 0 auto;
      font-size: 20px;
      line-height: 1;
      margin-bottom: 0;
    }

    .metric .tiny {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-list {
      flex: 1 1 auto;
      overflow: auto;
      padding: 6px;
      min-height: 0;
    }

    .session-card {
      position: relative;
      width: 100%;
      border: 1px solid rgba(164, 125, 82, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 252, 246, 0.96), rgba(253, 247, 238, 0.92));
      border-radius: 16px;
      padding: 11px 11px 10px 14px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
      color: inherit;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .session-card:hover,
    .session-card.active {
      border-color: rgba(181, 84, 47, 0.28);
      box-shadow: 0 14px 30px rgba(110, 77, 35, 0.12);
      transform: translateY(-2px);
    }

    .session-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: rgba(181, 84, 47, 0.18);
    }

    .session-card.severity-card-CRITICAL::before {
      background: linear-gradient(180deg, #bc3f35, #8f221d);
    }

    .session-card.severity-card-HIGH::before {
      background: linear-gradient(180deg, #c3741f, #a14d18);
    }

    .session-card.severity-card-MEDIUM::before {
      background: linear-gradient(180deg, #cfad4e, #b28527);
    }

    .session-card.severity-card-LOW::before {
      background: linear-gradient(180deg, #4e9a6a, #2f7750);
    }

    .session-card.status-card-awaiting_decision {
      background:
        linear-gradient(180deg, rgba(255, 248, 233, 0.98), rgba(252, 241, 220, 0.94));
    }

    .session-card.status-card-completed {
      background:
        linear-gradient(180deg, rgba(247, 252, 247, 0.97), rgba(236, 246, 238, 0.94));
    }

    .session-card.active {
      outline: 2px solid rgba(181, 84, 47, 0.18);
      outline-offset: -2px;
    }

    .session-card strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .session-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .session-card-id {
      min-width: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      color: #30261d;
      word-break: break-word;
    }

    .session-card-token {
      flex: 0 0 auto;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(164, 125, 82, 0.1);
      white-space: nowrap;
    }

    .status-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 6px;
    }

    .session-card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .session-card-model {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-card-dot {
      flex: 0 0 auto;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(125, 47, 22, 0.45);
    }

    .session-card-preview {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.45;
      min-height: 2.8em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.7);
    }

    .severity-CRITICAL {
      color: #fff;
      background: var(--bad);
    }

    .severity-HIGH {
      color: #fff;
      background: var(--accent);
    }

    .severity-MEDIUM {
      color: #553a10;
      background: #efd49f;
    }

    .severity-LOW {
      color: #0d5130;
      background: #cce8d4;
    }

    .status-awaiting_decision {
      color: #5b3b0b;
      background: #f4dfb2;
    }

    .status-completed {
      color: #0b4d30;
      background: #d4ead9;
    }

    .footer-note {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .runtime-panel input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(164, 125, 82, 0.16);
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      outline: none;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .runtime-panel button {
      padding: 8px 12px;
      font-size: 13px;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 36px);
      min-height: 0;
    }

    .hero {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(120deg, rgba(255, 244, 224, 0.95), rgba(253, 247, 239, 0.74)),
        radial-gradient(circle at top right, rgba(181, 84, 47, 0.12), transparent 30%);
      flex: 0 0 auto;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .hero-top > div:first-child {
      flex: 1 1 auto;
      min-width: 0;
    }

    .hero h2 {
      margin: 0 0 4px;
      font-size: 20px;
      line-height: 1.15;
      word-break: break-word;
    }

    .session-meta {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
      justify-content: flex-end;
      max-width: 46%;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      flex: 0 0 clamp(180px, 20vh, 240px);
      height: clamp(180px, 20vh, 240px);
    }

    .card {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(164, 125, 82, 0.12);
      overflow: auto;
      min-height: 0;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent-deep);
    }

    .card p,
    .card li,
    .report,
    textarea,
    input,
    button {
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .card p,
    .card li {
      color: #322a23;
      line-height: 1.45;
      font-size: 13px;
    }

    ul {
      margin: 0;
      padding-left: 16px;
    }

    .conversation {
      display: grid;
      grid-template-rows: 1fr auto;
      flex: 1 1 auto;
      min-height: 0;
      padding: 12px 14px 14px;
      gap: 10px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }

    .messages {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 8px;
      padding-bottom: 8px;
      min-height: 0;
    }

    .message {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 14px;
      box-shadow: 0 12px 24px rgba(83, 54, 21, 0.08);
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #c25a33, #954121);
      color: #fff7f0;
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(255, 253, 249, 0.95);
      border: 1px solid rgba(164, 125, 82, 0.12);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      padding-top: 6px;
      background: linear-gradient(180deg, rgba(255, 250, 244, 0), rgba(255, 250, 244, 0.92) 28%);
      flex: 0 0 auto;
    }

    textarea {
      width: 100%;
      min-height: 84px;
      max-height: 160px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid rgba(164, 125, 82, 0.16);
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      outline: none;
    }

    .actions {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 10px 14px 12px;
      background: rgba(255, 251, 246, 0.86);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(135deg, #bc5d36, #97391c);
      color: #fff;
    }

    .approve {
      background: linear-gradient(135deg, #2e8453, #1f6540);
      color: #fff;
    }

    .reject {
      background: linear-gradient(135deg, #a63d3d, #852727);
      color: #fff;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.85);
      color: var(--ink);
      border: 1px solid rgba(164, 125, 82, 0.14);
    }

    .empty {
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .report {
      white-space: pre-wrap;
      line-height: 1.65;
      color: #332a22;
      font-size: 14px;
    }

    .tiny {
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .shell {
        grid-template-columns: 1fr;
        height: auto;
      }

      .workspace {
        height: auto;
      }

      .grid {
        grid-template-columns: 1fr;
        height: auto;
        flex-basis: auto;
      }

      .hero-top {
        flex-direction: column;
      }

      .session-meta {
        max-width: 100%;
        justify-content: flex-start;
      }

      .sidebar {
        height: auto;
      }

      .conversation {
        min-height: 420px;
      }

      .runtime-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel sidebar">
      <section class="brand">
        <p class="eyebrow">AI DevOps Console</p>
        <h1>值班台</h1>
        <p class="subtle">Kafka 事件进入后自动生成诊断会话，人工可在右侧实时追问并做最后审批。</p>
      </section>
      <section class="metrics">
        <div class="metric">
          <strong id="metric-total">0</strong>
          <span class="tiny">当前会话</span>
        </div>
        <div class="metric">
          <strong id="metric-pending">0</strong>
          <span class="tiny">等待决策</span>
        </div>
      </section>
      <section id="session-list" class="session-list"></section>
      <section class="runtime-panel">
        <div id="runtime-summary" class="tiny">当前模型配置加载中...</div>
        <div class="runtime-form">
          <div class="runtime-grid">
            <div class="runtime-field">
              <label for="provider-select">Provider</label>
              <select id="provider-select"></select>
            </div>
            <div class="runtime-field">
              <label for="model-name-input">Model</label>
              <input id="model-name-input" type="text" placeholder="输入模型名，例如 gpt-4o-mini" />
            </div>
          </div>
          <button id="save-runtime-button" class="secondary" type="button">切换模型</button>
        </div>
      </section>
      <section class="footer-note">
        <div id="dashboard-state">Dashboard WebSocket 连接中...</div>
      </section>
    </aside>

    <main class="panel workspace">
      <section class="hero">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Realtime Incident Session</p>
            <h2 id="session-title">等待会话进入</h2>
            <p id="session-subtitle" class="subtle">Kafka 新事件进入后，这里会显示首轮 AI 诊断结果。</p>
          </div>
          <div class="session-meta" id="session-meta"></div>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <h3>根因与建议</h3>
          <p id="root-cause">暂无数据</p>
          <p id="impact-analysis" class="subtle"></p>
          <ul id="recommendations"></ul>
        </article>
        <article class="card">
          <h3>执行记录</h3>
          <ul id="execution-log"></ul>
        </article>
      </section>

      <section class="conversation">
        <div id="messages" class="messages">
          <div class="empty">左侧选择一个会话，或等待 Kafka 转发新事件。</div>
        </div>
        <div class="composer">
          <textarea id="question-input" placeholder="输入追问，例如：为什么 AI 判断应该重启而不是扩容？"></textarea>
          <button id="ask-button" class="primary">发送追问</button>
        </div>
      </section>

      <section class="actions">
        <button id="refresh-button" class="secondary">刷新状态</button>
        <button id="approve-button" class="approve">批准执行</button>
        <button id="reject-button" class="reject">拒绝执行</button>
      </section>
    </main>
  </div>

  <script>
    const state = {
      sessions: new Map(),
      selectedSessionId: null,
      dashboardSocket: null,
      sessionSocket: null,
      sessionSocketId: null,
      sessionReconnectTimer: null,
      runtimeConfig: null,
    };

    const elements = {
      sessionList: document.getElementById("session-list"),
      dashboardState: document.getElementById("dashboard-state"),
      runtimeSummary: document.getElementById("runtime-summary"),
      providerSelect: document.getElementById("provider-select"),
      modelNameInput: document.getElementById("model-name-input"),
      saveRuntimeButton: document.getElementById("save-runtime-button"),
      metricTotal: document.getElementById("metric-total"),
      metricPending: document.getElementById("metric-pending"),
      sessionTitle: document.getElementById("session-title"),
      sessionSubtitle: document.getElementById("session-subtitle"),
      sessionMeta: document.getElementById("session-meta"),
      rootCause: document.getElementById("root-cause"),
      impactAnalysis: document.getElementById("impact-analysis"),
      recommendations: document.getElementById("recommendations"),
      executionLog: document.getElementById("execution-log"),
      messages: document.getElementById("messages"),
      questionInput: document.getElementById("question-input"),
      askButton: document.getElementById("ask-button"),
      approveButton: document.getElementById("approve-button"),
      rejectButton: document.getElementById("reject-button"),
      refreshButton: document.getElementById("refresh-button"),
    };

    function wsBase() {
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      return `${protocol}://${window.location.host}`;
    }

    function createBadge(label, className) {
      const span = document.createElement("span");
      span.className = `badge ${className}`;
      span.textContent = label;
      return span;
    }

    function formatTokens(tokenUsage) {
      const total = tokenUsage?.total_tokens || 0;
      const input = tokenUsage?.input_tokens || 0;
      const output = tokenUsage?.output_tokens || 0;
      return `tokens ${total} (${input}/${output})`;
    }

    function renderRuntimeConfig() {
      const config = state.runtimeConfig;
      if (!config) {
        elements.runtimeSummary.textContent = "当前模型配置加载中...";
        return;
      }

      elements.providerSelect.innerHTML = "";
      (config.options || []).forEach((option) => {
        const el = document.createElement("option");
        el.value = option.provider;
        el.textContent = `${option.label} (${option.provider})`;
        el.selected = config.current?.provider === option.provider;
        elements.providerSelect.appendChild(el);
      });
      elements.modelNameInput.value = config.current?.model_name || "";
      elements.runtimeSummary.textContent = `当前模型: ${config.current?.provider || "-"} / ${config.current?.model_name || "-"}`;
    }

    function renderMetrics() {
      const sessions = Array.from(state.sessions.values());
      elements.metricTotal.textContent = String(sessions.length);
      elements.metricPending.textContent = String(
        sessions.filter((item) => item.summary?.status === "awaiting_decision").length
      );
    }

    function sessionPreview(session) {
      const cause = session.summary?.root_cause || "等待 AI 诊断";
      return cause.length > 96 ? `${cause.slice(0, 96)}...` : cause;
    }

    function sortSessions(items) {
      return items.sort((a, b) => {
        const aPending = a.summary?.status === "awaiting_decision" ? 0 : 1;
        const bPending = b.summary?.status === "awaiting_decision" ? 0 : 1;
        if (aPending !== bPending) return aPending - bPending;
        return (a.session_id || "").localeCompare(b.session_id || "");
      });
    }

    function renderSessionList() {
      const sessions = sortSessions(Array.from(state.sessions.values()));
      renderMetrics();
      elements.sessionList.innerHTML = "";

      if (!sessions.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.style.minHeight = "240px";
        empty.textContent = "还没有会话。启动 Kafka 转发器后，新的日志事件会出现在这里。";
        elements.sessionList.appendChild(empty);
        return;
      }

      sessions.forEach((session) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = [
          "session-card",
          session.session_id === state.selectedSessionId ? "active" : "",
          session.summary?.severity ? `severity-card-${session.summary.severity}` : "",
          session.summary?.status ? `status-card-${session.summary.status}` : "",
        ].filter(Boolean).join(" ");
        button.addEventListener("click", () => selectSession(session.session_id));

        const top = document.createElement("div");
        top.className = "session-card-top";

        const title = document.createElement("div");
        title.className = "session-card-id";
        title.textContent = session.session_id;
        top.appendChild(title);

        const token = document.createElement("div");
        token.className = "session-card-token";
        token.textContent = `${session.summary?.token_usage?.total_tokens || 0} tok`;
        top.appendChild(token);

        button.appendChild(top);

        const statusRow = document.createElement("div");
        statusRow.className = "status-row";
        if (session.summary?.severity) {
          statusRow.appendChild(createBadge(session.summary.severity, `severity-${session.summary.severity}`));
        }
        if (session.summary?.status) {
          statusRow.appendChild(createBadge(session.summary.status, `status-${session.summary.status}`));
        }
        if (session.summary?.model_provider && session.summary?.model_name) {
          statusRow.appendChild(createBadge(`${session.summary.model_provider}:${session.summary.model_name}`, "secondary"));
        }
        button.appendChild(statusRow);

        const meta = document.createElement("div");
        meta.className = "session-card-meta";
        if (session.summary?.model_provider && session.summary?.model_name) {
          const model = document.createElement("div");
          model.className = "session-card-model";
          model.textContent = `${session.summary.model_provider}:${session.summary.model_name}`;
          meta.appendChild(model);
        }
        if (session.summary?.model_provider && session.summary?.model_name) {
          const dot = document.createElement("span");
          dot.className = "session-card-dot";
          meta.appendChild(dot);
        }
        const tokenMeta = document.createElement("div");
        tokenMeta.textContent = formatTokens(session.summary?.token_usage);
        meta.appendChild(tokenMeta);
        button.appendChild(meta);

        const desc = document.createElement("div");
        desc.className = "tiny session-card-preview";
        desc.textContent = sessionPreview(session);
        button.appendChild(desc);

        elements.sessionList.appendChild(button);
      });
    }

    function renderMessages(session) {
      elements.messages.innerHTML = "";
      const messages = dedupeAdjacentMessages(session.messages || []);
      if (!messages.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.style.minHeight = "220px";
        empty.textContent = "当前还没有追问记录。";
        elements.messages.appendChild(empty);
        return;
      }

      messages.forEach((content, index) => {
        const div = document.createElement("div");
        div.className = `message ${index % 2 === 0 ? "user" : "assistant"}`;
        div.textContent = content;
        elements.messages.appendChild(div);
      });
      elements.messages.scrollTop = elements.messages.scrollHeight;
    }

    function dedupeAdjacentMessages(messages) {
      const normalized = [];
      messages.forEach((item) => {
        if (!normalized.length || normalized[normalized.length - 1] !== item) {
          normalized.push(item);
        }
      });
      return normalized;
    }

    function renderSessionDetail() {
      const session = state.sessions.get(state.selectedSessionId);
      if (!session) {
        elements.sessionTitle.textContent = "等待会话进入";
        elements.sessionSubtitle.textContent = "Kafka 新事件进入后，这里会显示首轮 AI 诊断结果。";
        elements.sessionMeta.innerHTML = "";
        elements.rootCause.textContent = "暂无数据";
        elements.impactAnalysis.textContent = "";
        elements.recommendations.innerHTML = "";
        elements.executionLog.innerHTML = "";
        elements.messages.innerHTML = '<div class="empty">左侧选择一个会话，或等待 Kafka 转发新事件。</div>';
        return;
      }

      elements.sessionTitle.textContent = session.session_id;
      elements.sessionSubtitle.textContent = session.summary?.root_cause || "AI 已完成首轮诊断，等待人工追问或审批。";
      elements.rootCause.textContent = session.summary?.root_cause || "暂无根因描述";
      elements.impactAnalysis.textContent = session.report || "报告尚未生成，当前停在人工决策前。";

      elements.sessionMeta.innerHTML = "";
      if (session.summary?.severity) {
        elements.sessionMeta.appendChild(createBadge(session.summary.severity, `severity-${session.summary.severity}`));
      }
      if (session.summary?.status) {
        elements.sessionMeta.appendChild(createBadge(session.summary.status, `status-${session.summary.status}`));
      }
      if (session.summary?.model_provider && session.summary?.model_name) {
        elements.sessionMeta.appendChild(createBadge(`${session.summary.model_provider}:${session.summary.model_name}`, "secondary"));
      }
      if (session.summary?.auto_fix_action) {
        elements.sessionMeta.appendChild(createBadge(`auto: ${session.summary.auto_fix_action}`, "status-awaiting_decision"));
      }
      if (session.summary?.approval_required) {
        elements.sessionMeta.appendChild(createBadge("manual approval required", "status-awaiting_decision"));
      }
      elements.sessionMeta.appendChild(createBadge(formatTokens(session.summary?.token_usage), "secondary"));

      elements.recommendations.innerHTML = "";
      (session.summary?.recommendations || []).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        elements.recommendations.appendChild(li);
      });

      elements.executionLog.innerHTML = "";
      (session.execution_log || []).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        elements.executionLog.appendChild(li);
      });
      if (!session.execution_log?.length) {
        const li = document.createElement("li");
        li.textContent = "暂无执行动作";
        elements.executionLog.appendChild(li);
      }

      renderMessages(session);
    }

    function upsertSession(payload) {
      const prev = state.sessions.get(payload.session_id) || {};
      const next = {
        ...prev,
        ...payload,
      };
      state.sessions.set(payload.session_id, next);
      if (!state.selectedSessionId) {
        state.selectedSessionId = payload.session_id;
        connectSessionSocket(payload.session_id);
      }
      renderSessionList();
      if (state.selectedSessionId === payload.session_id) {
        renderSessionDetail();
      }
    }

    async function fetchSessions() {
      const response = await fetch("/api/sessions");
      const data = await response.json();
      (data.sessions || []).forEach((session) => {
        upsertSession({ session_id: session.session_id, summary: session });
      });
    }

    async function fetchRuntimeConfig() {
      const response = await fetch("/api/runtime/model");
      const data = await response.json();
      state.runtimeConfig = data;
      renderRuntimeConfig();
    }

    async function saveRuntimeConfig() {
      const provider = elements.providerSelect.value;
      const model_name = elements.modelNameInput.value.trim();
      if (!provider || !model_name) return;
      const response = await fetch("/api/runtime/model", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ provider, model_name }),
      });
      if (!response.ok) return;
      state.runtimeConfig = await response.json();
      renderRuntimeConfig();
    }

    async function fetchSession(sessionId) {
      const response = await fetch(`/api/session/${encodeURIComponent(sessionId)}`);
      if (!response.ok) return;
      const data = await response.json();
      upsertSession(data);
    }

    async function submitAskQuestion(question) {
      if (!state.selectedSessionId) return;
      const response = await fetch("/api/conversation/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: state.selectedSessionId, question }),
      });
      if (!response.ok) return;
      elements.questionInput.value = "";
      await fetchSession(state.selectedSessionId);
    }

    async function submitDecision(decision) {
      if (!state.selectedSessionId) return;
      const response = await fetch("/api/decision/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: state.selectedSessionId, decision }),
      });
      if (!response.ok) return;
      await fetchSession(state.selectedSessionId);
    }

    function connectDashboardSocket() {
      const socket = new WebSocket(`${wsBase()}/ws/dashboard`);
      state.dashboardSocket = socket;
      elements.dashboardState.textContent = "Dashboard WebSocket 连接中...";

      socket.addEventListener("open", () => {
        elements.dashboardState.textContent = "Dashboard WebSocket 已连接";
      });

      socket.addEventListener("message", (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === "snapshot") {
          (payload.sessions || []).forEach((session) => {
            upsertSession({ session_id: session.session_id, summary: session });
          });
          renderSessionList();
        }
        if (payload.type === "session_update") {
          upsertSession(payload);
        }
      });

      socket.addEventListener("close", () => {
        elements.dashboardState.textContent = "Dashboard WebSocket 已断开，3 秒后重连";
        window.setTimeout(connectDashboardSocket, 3000);
      });
    }

    function connectSessionSocket(sessionId, force = false) {
      if (!force && state.sessionSocket && state.sessionSocket.readyState === WebSocket.OPEN && state.sessionSocketId === sessionId) {
        return;
      }

      if (state.sessionReconnectTimer) {
        window.clearTimeout(state.sessionReconnectTimer);
        state.sessionReconnectTimer = null;
      }

      if (state.sessionSocket) {
        state.sessionSocket.__manualClose = true;
        state.sessionSocket.close();
      }

      const socket = new WebSocket(`${wsBase()}/ws/session/${encodeURIComponent(sessionId)}`);
      state.sessionSocket = socket;
      state.sessionSocketId = sessionId;

      socket.addEventListener("message", (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === "snapshot" || payload.type === "session_update" || payload.type === "state") {
          upsertSession(payload);
        }
        if (payload.type === "ask_result" || payload.type === "decision_result") {
          if (payload.answer) {
            elements.questionInput.value = "";
          }
          fetchSession(payload.session_id);
        }
      });

      socket.addEventListener("close", () => {
        const shouldReconnect =
          !socket.__manualClose &&
          state.selectedSessionId === sessionId &&
          state.sessionSocket === socket;
        if (state.sessionSocket === socket) {
          state.sessionSocket = null;
          state.sessionSocketId = null;
        }
        if (shouldReconnect) {
          state.sessionReconnectTimer = window.setTimeout(() => {
            connectSessionSocket(sessionId, true);
          }, 2000);
        }
      });
    }

    function selectSession(sessionId) {
      state.selectedSessionId = sessionId;
      renderSessionList();
      renderSessionDetail();
      fetchSession(sessionId);
      connectSessionSocket(sessionId);
    }

    function sendSessionAction(payload) {
      if (!state.selectedSessionId) {
        return false;
      }
      if (!state.sessionSocket || state.sessionSocket.readyState !== WebSocket.OPEN) {
        return false;
      }
      state.sessionSocket.send(JSON.stringify(payload));
      return true;
    }

    elements.askButton.addEventListener("click", async () => {
      const question = elements.questionInput.value.trim();
      if (!question) return;
      const sent = sendSessionAction({ action: "ask", question });
      if (!sent) {
        await submitAskQuestion(question);
      }
    });

    elements.approveButton.addEventListener("click", async () => {
      const sent = sendSessionAction({ action: "approve" });
      if (!sent) {
        await submitDecision("approve");
      }
    });

    elements.rejectButton.addEventListener("click", async () => {
      const sent = sendSessionAction({ action: "reject" });
      if (!sent) {
        await submitDecision("reject");
      }
    });

    elements.refreshButton.addEventListener("click", () => {
      if (state.selectedSessionId) {
        sendSessionAction({ action: "get_state" });
        fetchSession(state.selectedSessionId);
      } else {
        fetchSessions();
      }
      fetchRuntimeConfig();
    });

    elements.providerSelect.addEventListener("change", () => {
      const selected = (state.runtimeConfig?.options || []).find((item) => item.provider === elements.providerSelect.value);
      if (selected && !elements.modelNameInput.value.trim()) {
        elements.modelNameInput.value = selected.default_model || "";
      }
    });

    elements.saveRuntimeButton.addEventListener("click", () => {
      saveRuntimeConfig();
    });

    elements.questionInput.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        elements.askButton.click();
      }
    });

    fetchSessions();
    fetchRuntimeConfig();
    connectDashboardSocket();
    renderSessionList();
    renderSessionDetail();
  </script>
</body>
</html>
